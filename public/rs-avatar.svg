<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f2e"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Subtle inner ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#38bdf820" stroke-width="1"/>

  <!-- RS text -->
  <text
    x="100"
    y="122"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    letter-spacing="-2"
    text-anchor="middle"
    fill="url(#txt)"
  >RS</text>
</svg>
